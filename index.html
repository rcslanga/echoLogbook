<!DOCTYPE html>

<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO Drive Pro - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBIJPWtg4ruD7z9f1OGltvFFVPQBqa8eGQ&libraries=places&callback=initMap" async defer></script>
    <style>
        :root {
            --bolt-blue: #002868;
            --bolt-red: #BF0A30;
            --bg-light: #F5F7FA;
            --card-bg: #FFFFFF;
            --input-bg: #FFFFFF;
            --text-gray: #6B7280;
            --text-dark: #1A1A1A;
            --border-color: #E5E7EB;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding-bottom: 90px;
            margin: 0;
        }

        /* Views */
        .app-view { display: none; }
        .app-view.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h1, h2, h3, h4 { font-weight: 700; letter-spacing: -0.5px; }

        /* Login View Specifics */
        #login-view {
            background: linear-gradient(135deg, var(--bolt-blue) 0%, #001A44 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding-bottom: 0; margin: 0;
        }

        .login-card {
            background: var(--card-bg); border-radius: 24px; padding: 40px 30px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); margin: 20px;
        }

        .login-logo { font-size: 4rem; color: var(--bolt-blue); margin-bottom: 10px; }

        /* Home View Styles */
        .home-header {
            padding: 40px 20px 20px; display: flex; justify-content: space-between;
            align-items: center; background: var(--bolt-blue); color: white;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0, 40, 104, 0.15);
        }

        .home-header h1 { color: white; }
        .home-header .text-secondary { color: rgba(255, 255, 255, 0.8) !important; }

        .user-profile {
            width: 45px; height: 45px; background: rgba(255, 255, 255, 0.2);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 1.2rem; color: white;
        }

        .action-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px;
        }

        .action-card {
            background: var(--card-bg); border-radius: 20px; padding: 24px 15px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); border: 1px solid var(--border-color);
        }

        .action-card:hover, .action-card:active {
            transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .action-icon {
            width: 60px; height: 60px; border-radius: 20px; display: flex;
            align-items: center; justify-content: center; font-size: 1.8rem;
        }

        .icon-ride { background: #E8F0FE; color: var(--bolt-blue); }
        .icon-history { background: #F3F4F6; color: var(--text-dark); }
        .icon-danger { background: #FDE8E8; color: var(--bolt-red); }

        .promo-banner {
            margin: 25px 20px; background: linear-gradient(135deg, var(--bolt-blue) 0%, #001A44 100%);
            border-radius: 24px; padding: 24px; position: relative; overflow: hidden;
            color: white; box-shadow: 0 8px 20px rgba(0, 40, 104, 0.2);
        }

        .promo-banner h3 { margin: 0; font-size: 1.2rem; z-index: 2; position: relative; }
        .promo-banner p { margin: 8px 0 0; font-size: 0.85rem; opacity: 0.9; z-index: 2; position: relative; line-height: 1.4; }
        .promo-icon { position: absolute; right: -10px; bottom: -20px; font-size: 7rem; opacity: 0.15; transform: rotate(-10deg); }

        .recent-section { padding: 20px; }
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; }

        /* Form Styles */
        .form-header {
            padding: 30px 20px 20px; background: var(--bolt-blue); color: white;
            position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 15px;
            border-bottom-left-radius: 24px; border-bottom-right-radius: 24px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2); border: none; color: white;
            font-size: 1.1rem; cursor: pointer; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .form-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            margin: 0 20px 20px; border: 1px solid var(--border-color);
        }

        .form-label { color: var(--text-dark); font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; display: block; }

        .form-control, .form-select {
            background-color: transparent; border: none; border-bottom: 2px solid var(--border-color);
            border-radius: 0; padding: 10px 5px; margin-bottom: 20px; font-size: 1rem;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: none; border-bottom: 2px solid var(--bolt-blue);
        }

        .btn-main {
            background-color: var(--bolt-blue); color: white; border: none;
            border-radius: 20px; padding: 16px; width: 100%; font-weight: 600; font-size: 1.1rem;
        }

        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 9999; justify-content: center; align-items: center;
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
    </div>

    <div id="login-view" class="app-view">
        <div class="login-card">
            <i class="fa-solid fa-car-side login-logo"></i>
            <h2 style="font-weight: 800; color: var(--bolt-blue); margin-bottom: 5px;">ECHO Drive Pro</h2>
            <p class="text-secondary mb-4 small">Acesso Restrito</p>

            <form id="loginForm">
                <div class="text-start mb-4">
                    <label class="form-label text-secondary small mb-1">E-mail Corporativo</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="o.seu.email@exemplo.com" required>
                </div>
                <button type="button" class="btn-main" onclick="switchView('home-view')">Entrar</button>
            </form>
        </div>
    </div>

    <div id="home-view" class="app-view active">
        <div class="home-header">
            <div>
                <h1 class="mb-0">ECHO Drive</h1>
                <div class="text-secondary small fw-bold mt-1"><i class="fa-solid fa-star"></i> Pro Fleet | Moçambique</div>
            </div>
            <div class="user-profile"><i class="fa-brands fa-google"></i></div>
        </div>

        <div class="action-grid">
            <div class="action-card" onclick="switchView('form-view');">
                <div class="action-icon icon-ride"><i class="fa-solid fa-car-side"></i></div>
                <span class="fw-bold" style="color: black !important;">Nova Viagem</span>
            </div>
            <div class="action-card" onclick="switchView('maintenance-view');">
                <div class="action-icon icon-ride" style="background:var(--bolt-blue); color:white;"><i class="fa-solid fa-tools"></i></div>
                <span class="fw-bold" style="color: black !important;">Manutenção</span>
            </div>
            <div class="action-card" onclick="switchView('incidents-view');">
                <div class="action-icon icon-danger" style="background:var(--bolt-red); color:white;"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <span class="fw-bold" style="color: black !important;">Ocorrência</span>
            </div>
            <div class="action-card" onclick="alert('Histórico será carregado em breve.');" style="grid-column: span 2; flex-direction: row; justify-content: center; padding: 15px;">
                <div class="action-icon icon-history" style="width: 40px; height: 40px; font-size:1.1rem;"><i class="fa-solid fa-clock-rotate-left"></i></div>
                <span class="fw-bold mb-0" style="margin-left: 5px; color: black !important;">Histórico de Viagens</span>
            </div>
        </div>
    </div>

    <div id="form-view" class="app-view">
        <div class="form-header">
            <button class="back-btn" onclick="switchView('home-view')"><i class="fa-solid fa-arrow-left"></i></button>
            <h3 class="mb-0 fs-5">Registo de Viagem</h3>
        </div>
        <div class="form-card mt-3">
            <form id="logbookForm">
                <label class="form-label">Motorista</label>
                <input type="text" id="driverName" class="form-control" required>
                
                <label class="form-label">Viatura</label>
                <input type="text" id="vehiclePlate" class="form-control" required>

                <div class="row">
                    <div class="col-6">
                        <label class="form-label">KM Inicial</label>
                        <input type="number" id="kmInitial" class="form-control" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">KM Final</label>
                        <input type="number" id="kmFinal" class="form-control" required>
                    </div>
                </div>

                <button type="button" class="btn-main mt-3" onclick="submitLogbook()">Submeter Viagem</button>
            </form>
        </div>
    </div>

    <div id="incidents-view" class="app-view">
        <div class="form-header" style="background: var(--bolt-red);">
            <button class="back-btn" onclick="switchView('home-view')"><i class="fa-solid fa-arrow-left"></i></button>
            <h3 class="mb-0 fs-5">Registar Ocorrência</h3>
        </div>
        <div class="form-card mt-3">
            <form id="incidentForm">
                <label class="form-label">Descrição do Problema</label>
                <textarea id="incidentDesc" class="form-control" rows="3" required></textarea>
                <button type="button" class="btn-main mt-3" style="background: var(--bolt-red);" onclick="submitIncident()">Reportar Emergência</button>
            </form>
        </div>
    </div>

    <div id="maintenance-view" class="app-view">
        <div class="form-header">
            <button class="back-btn" onclick="switchView('home-view')"><i class="fa-solid fa-arrow-left"></i></button>
            <h3 class="mb-0 fs-5">Manutenção</h3>
        </div>
        <div class="form-card mt-3">
            <form id="maintenanceForm">
                <label class="form-label">Tipo de Serviço</label>
                <input type="text" id="serviceType" class="form-control" required>
                <button type="button" class="btn-main mt-3" onclick="submitMaintenance()">Registar Manutenção</button>
            </form>
        </div>
    </div>

    <script>
        // ======= CONFIGURAÇÃO DA VERCEL =======
        // Nova rota em vez do Google Apps Script
        const API_URL = '/api/save-entry';

        // Lógica para alternar ecrãs
        function switchView(viewId) {
            document.querySelectorAll('.app-view').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(viewId).classList.add('active');
            window.scrollTo(0, 0);
        }

        // ======= SUBMISSÃO DE VIAGEM =======
        async function submitLogbook() {
            document.getElementById('loader').style.display = 'flex';
            
            const payload = {
                action: 'logbook',
                driver: document.getElementById('driverName').value,
                vehicle: document.getElementById('vehiclePlate').value,
                kmI: document.getElementById('kmInitial').value,
                kmF: document.getElementById('kmFinal').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    alert('Viagem registada com sucesso na Vercel!');
                    document.getElementById('logbookForm').reset();
                    switchView('home-view');
                } else {
                    alert('Erro ao gravar: ' + (data.error || 'Verifique a Vercel.'));
                }
            } catch (error) {
                alert('Erro de rede: O Backend Vercel não respondeu.');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        // ======= SUBMISSÃO DE INCIDENTE =======
        async function submitIncident() {
            document.getElementById('loader').style.display = 'flex';
            
            const payload = {
                action: 'incident',
                description: document.getElementById('incidentDesc').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    alert('Ocorrência reportada com sucesso!');
                    document.getElementById('incidentForm').reset();
                    switchView('home-view');
                }
            } catch (error) {
                alert('Erro ao enviar ocorrência.');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        // ======= SUBMISSÃO DE MANUTENÇÃO =======
        async function submitMaintenance() {
            document.getElementById('loader').style.display = 'flex';
            
            const payload = {
                action: 'maintenance',
                serviceType: document.getElementById('serviceType').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    alert('Manutenção guardada com sucesso!');
                    document.getElementById('maintenanceForm').reset();
                    switchView('home-view');
                }
            } catch (error) {
                alert('Erro ao enviar manutenção.');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
