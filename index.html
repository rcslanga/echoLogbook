<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO Drive Pro v3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --uber-black: #060606; --uber-blue: #276ef1; --card-bg: #141414; --input-bg: #202020; --text-gray: #a6a6a6; }
        body { background-color: var(--uber-black); color: white; font-family: 'Inter', sans-serif; padding-bottom: 120px; }
        
        /* Cartões com Profundidade */
        .form-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin: 10px 15px; border: 1px solid #282828; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; }
        
        .form-label { color: var(--text-gray); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 0.5px; }
        
        /* Inputs Estilizados */
        .form-control, .form-select { background-color: var(--input-bg); border: 1px solid #333; color: white; border-radius: 12px; padding: 14px; margin-bottom: 15px; transition: all 0.3s; font-size: 1rem; }
        .form-control:focus { background-color: #2a2a2a; border-color: var(--uber-blue); box-shadow: 0 0 0 3px rgba(39, 110, 241, 0.2); color: white; }

        /* KM Display Gigante */
        .km-summary { background: linear-gradient(135deg, #1e1e1e 0%, #000 100%); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid var(--uber-blue); margin-bottom: 20px; }
        .km-summary h2 { font-size: 2.5rem; font-weight: 900; color: var(--uber-blue); margin: 0; }
        .km-summary span { font-size: 0.7rem; color: var(--text-gray); text-transform: uppercase; }

        /* Botão Flutuante Principal */
        .fixed-bottom-btn { position: fixed; bottom: 25px; left: 20px; right: 20px; z-index: 1000; }
        .btn-uber { background-color: var(--uber-blue); color: white; border: none; border-radius: 18px; padding: 20px; width: 100%; font-weight: 700; font-size: 1.1rem; box-shadow: 0 10px 25px rgba(39, 110, 241, 0.4); }
        .btn-uber:active { transform: scale(0.97); }

        /* Estilo para Itens de Abastecimento */
        .fuel-entry { background: #1a1a1a; border-radius: 15px; padding: 15px; border-left: 5px solid var(--uber-blue); margin-bottom: 15px; }

        /* Indicador de Passos */
        .step-indicator { display: flex; justify-content: space-around; padding: 10px 20px; }
        .step { height: 4px; flex: 1; margin: 0 4px; background: #333; border-radius: 2px; }
        .step.active { background: var(--uber-blue); }
    </style>
</head>
<body>

<div class="p-4 pb-2">
    <div class="d-flex justify-content-between align-items-center">
        <h1 class="fw-bold h3 mb-0">ECHO <span class="text-primary">Log</span></h1>
        <div id="connectionStatus" class="badge bg-success" style="border-radius: 50px;">Online</div>
    </div>
</div>

<div class="step-indicator">
    <div class="step active" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
</div>

<form id="logForm">
    <div class="tab-pane fade show active" id="tab-1">
        <div class="form-card">
            <label class="form-label">Contexto da Viagem</label>
            <div class="row g-2">
                <div class="col-6">
                    <select id="province" class="form-select" onchange="atualizarFrota(); sugerirPrecoCombustivel()" required>
                        <option value="">Província...</option>
                        <option>Maputo</option><option>Sofala</option><option>Manica</option><option>Tete</option><option>Niassa</option>
                    </select>
                </div>
                <div class="col-6">
                    <select id="vehicle" class="form-select" disabled required onchange="updateThumb()">
                        <option value="">Viatura...</option>
                    </select>
                </div>
            </div>

            <div class="km-summary">
                <span id="kmLabel">Distância Estimada</span>
                <h2 id="totalKm">0</h2>
                <span>QUILÓMETROS</span>
            </div>

            <div class="row">
                <div class="col-6"><label class="form-label">KM Inicial</label><input type="number" id="kmI" class="form-control" inputmode="numeric" oninput="calcKm()"></div>
                <div class="col-6"><label class="form-label">KM Final</label><input type="number" id="kmF" class="form-control" inputmode="numeric" oninput="calcKm()"></div>
            </div>

            <label class="form-label">Horários</label>
            <div class="row">
                <div class="col-6"><input type="datetime-local" id="dataPartida" class="form-control" onchange="validarDatas()"></div>
                <div class="col-6"><input type="datetime-local" id="dataChegada" class="form-control" onchange="validarDatas()"></div>
            </div>
        </div>
        <div class="fixed-bottom-btn"><button type="button" class="btn-uber" onclick="navTo('tab-2', 2)">ABASTECIMENTO & COSTOS</button></div>
    </div>

    <div class="tab-pane fade d-none" id="tab-2">
        <div class="form-card">
            <div id="fuelContainer"></div>
            <button type="button" class="btn-add" onclick="addFuelEntry()">+ REGISTAR ABASTECIMENTO</button>
            
            <div class="p-3 mt-2" style="background: #000; border-radius: 12px;">
                <div class="d-flex justify-content-between small mb-1">
                    <span>Total Litros:</span><span id="resL">0.00 L</span>
                </div>
                <div class="d-flex justify-content-between fw-bold">
                    <span>Total MZN:</span><span id="resM">0.00 MT</span>
                </div>
            </div>
        </div>
        <div class="fixed-bottom-btn">
            <div class="row g-2">
                <div class="col-4"><button type="button" class="btn btn-dark w-100 py-3" onclick="navTo('tab-1', 1)">VOLTAR</button></div>
                <div class="col-8"><button type="button" class="btn-uber" onclick="navTo('tab-3', 3)">DADOS DA MISSÃO</button></div>
            </div>
        </div>
    </div>

    <div class="tab-pane fade d-none" id="tab-3">
        <div class="form-card">
            <label class="form-label">Responsável</label>
            <input class="form-control" list="staffList" id="passenger" placeholder="Nome ou Email do Passageiro">
            
            <label class="form-label">Task Code</label>
            <select id="task" class="form-select" required>
                <option>2010 - Programmatic</option>
                <option>4010 - Operations</option>
                <option>3020 - Field Visit</option>
            </select>

            <label class="form-label">Rota</label>
            <div class="row">
                <div class="col-6"><input type="text" id="ori" class="form-control" placeholder="Origem"></div>
                <div class="col-6"><input type="text" id="des" class="form-control" placeholder="Destino"></div>
            </div>
        </div>
        <div class="fixed-bottom-btn">
            <button type="submit" class="btn-uber" style="background: white; color: black;">FINALIZAR E ENVIAR</button>
        </div>
    </div>
</form>

<script>
    // Navegação Inteligente
    function navTo(tabId, step) {
        document.querySelectorAll('.tab-pane').forEach(t => t.classList.add('d-none'));
        document.getElementById(tabId).classList.remove('d-none');
        document.getElementById(tabId).classList.add('show');
        
        document.querySelectorAll('.step').forEach((s, idx) => {
            s.classList.toggle('active', idx < step);
        });
        window.scrollTo(0,0);
    }

    // Cálculo de KM em Tempo Real
    function calcKm() {
        const ki = parseFloat(document.getElementById('kmI').value) || 0;
        const kf = parseFloat(document.getElementById('kmF').value) || 0;
        const diff = kf - ki;
        const display = document.getElementById('totalKm');
        
        if (kf > 0 && diff < 0) {
            display.style.color = "#ff4d4d";
            display.innerText = "!";
        } else {
            display.style.color = "var(--uber-blue)";
            display.innerText = diff > 0 ? diff : 0;
        }
    }

    // O resto das funções (atualizarFrota, addFuelEntry, calcFuel) 
    // permanecem com a lógica anterior, apenas com o visual atualizado.
</script>
</body>
</html>
