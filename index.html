<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO Drive Pro v2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --uber-black: #050505; --uber-blue: #276ef1; --card-bg: #121212; --input-bg: #1f1f1f; --text-gray: #a6a6a6; }
        body { background-color: var(--uber-black); color: white; font-family: 'Inter', sans-serif; padding-bottom: 120px; }
        .form-card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin: 15px; border: 1px solid #222; position: relative; }
        .form-label { color: var(--text-gray); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .form-control, .form-select { background-color: var(--input-bg); border: 1px solid #333; color: white; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        
        /* Estilo para múltiplos abastecimentos */
        .fuel-entry { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--uber-blue); position: relative; }
        .remove-entry { position: absolute; top: 10px; right: 10px; color: #ff4d4d; font-size: 1.2rem; cursor: pointer; }
        .btn-add { background: transparent; border: 1px dashed var(--uber-blue); color: var(--uber-blue); width: 100%; padding: 10px; border-radius: 12px; font-weight: 600; }
        
        .km-badge { background: #222; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; color: var(--uber-blue); }
        .fixed-bottom-btn { position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 1000; }
        .btn-uber { background-color: var(--uber-blue); color: white; border: none; border-radius: 18px; padding: 18px; width: 100%; font-weight: 700; }
        
        .nav-pills .nav-link.active { background-color: white; color: black; border-radius: 50px; }
    </style>
</head>
<body>

<div class="p-3">
    <h1 class="fw-bold h4">ECHO <span style="color: var(--uber-blue);">Drive</span></h1>
    <p class="text-secondary small">Registo Detalhado de Missão</p>
</div>

<ul class="nav nav-pills nav-justified px-3 mb-3" id="pills-tab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-v">VIAGEM</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-f">ABASTECER</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-e">EQUIPA</button></li>
</ul>

<form id="logForm">
    <div class="tab-content">
        
        <div class="tab-pane fade show active" id="tab-v">
            <div class="form-card">
                <label class="form-label">Partida (Data e Hora)</label>
                <input type="datetime-local" class="form-control" id="dataPartida" required>
                
                <label class="form-label">Chegada (Data e Hora)</label>
                <input type="datetime-local" class="form-control" id="dataChegada" required>

                <div class="row">
                    <div class="col-6"><label class="form-label">KM Inicial</label><input type="number" id="kmI" class="form-control" placeholder="0"></div>
                    <div class="col-6"><label class="form-label">KM Final</label><input type="number" id="kmF" class="form-control" placeholder="0"></div>
                </div>
                
                <label class="form-label">Viatura</label>
                <select id="vehicle" class="form-select" required>
                    <option>AGG-921-MC (Hilux)</option>
                    <option>AEA-596-MP (Ford)</option>
                </select>
            </div>
            <div class="fixed-bottom-btn"><button type="button" class="btn-uber" onclick="goTo('tab-f')">ADICIONAR ABASTECIMENTOS</button></div>
        </div>

        <div class="tab-pane fade" id="tab-f">
            <div class="form-card">
                <div id="fuelContainer">
                    </div>
                <button type="button" class="btn-add" onclick="addFuelEntry()">
                    <i class="fas fa-plus"></i> + NOVO ABASTECIMENTO
                </button>
                <div class="mt-3 text-end">
                    <small class="text-secondary">Total Litros: <span id="totalLitros">0</span>L</small><br>
                    <small class="text-secondary">Total Custo: <span id="totalMoney">0</span> MZN</small>
                </div>
            </div>
            <div class="fixed-bottom-btn"><button type="button" class="btn-uber" onclick="goTo('tab-e')">DADOS DA EQUIPA</button></div>
        </div>

        <div class="tab-pane fade" id="tab-e">
            <div class="form-card">
                <label class="form-label">Passageiro Responsável</label>
                <input class="form-control" list="staffList" id="passenger" placeholder="Nome do Staff">
                
                <label class="form-label">Task Code</label>
                <select id="task" class="form-select">
                    <option>2010</option><option>4010</option>
                </select>

                <div class="row">
                    <div class="col-6"><label class="form-label">Origem</label><input type="text" class="form-control" placeholder="Maputo"></div>
                    <div class="col-6"><label class="form-label">Destino</label><input type="text" class="form-control" placeholder="Beira"></div>
                </div>
            </div>
            <div class="fixed-bottom-btn"><button type="submit" class="btn-uber" style="background:white; color:black;">SUBMETER LOGBOOK</button></div>
        </div>

    </div>
</form>

<script>
    // Função para adicionar bloco de abastecimento
    let fuelCount = 0;
    function addFuelEntry() {
        fuelCount++;
        const container = document.getElementById('fuelContainer');
        const entry = document.createElement('div');
        entry.className = 'fuel-entry';
        entry.id = `entry-${fuelCount}`;
        entry.innerHTML = `
            <span class="remove-entry" onclick="removeFuel(${fuelCount})">&times;</span>
            <label class="form-label">Abastecimento #${fuelCount}</label>
            <div class="row">
                <div class="col-6">
                    <label class="form-label small">Litros</label>
                    <input type="number" step="0.01" class="form-control fuel-l" oninput="updateTotals()">
                </div>
                <div class="col-6">
                    <label class="form-label small">KM no Acto</label>
                    <input type="number" class="form-control fuel-km" placeholder="KM">
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <label class="form-label small">Custo (MZN)</label>
                    <input type="number" class="form-control fuel-cost" oninput="updateTotals()">
                </div>
            </div>
        `;
        container.appendChild(entry);
    }

    function removeFuel(id) {
        document.getElementById(`entry-${id}`).remove();
        updateTotals();
    }

    function updateTotals() {
        let totalL = 0;
        let totalM = 0;
        document.querySelectorAll('.fuel-l').forEach(el => totalL += parseFloat(el.value || 0));
        document.querySelectorAll('.fuel-cost').forEach(el => totalM += parseFloat(el.value || 0));
        document.getElementById('totalLitros').innerText = totalL.toFixed(2);
        document.getElementById('totalMoney').innerText = totalM.toFixed(2);
    }

    function goTo(tabId) {
        const trigger = document.querySelector(`button[data-bs-target="#${tabId}"]`);
        new bootstrap.Tab(trigger).show();
    }

    // Inicializa com um abastecimento vazio (opcional)
    // addFuelEntry();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
