<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StateDrive Pro | Test Unit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBIJPWtg4ruD7z9f1OGltvFFVPQBqa8eGQ&libraries=places&callback=initMap" async defer></script>

    <style>
        :root { 
            --u-black: #000000; --u-white: #FFFFFF; --u-gray: #F6F6F6; 
            --u-border: #EEEEEE; --u-text-gray: #545454; --u-blue: #276EF1; 
            --u-red: #E11900; --u-green: #05944F;
        }
        
        body { background-color: var(--u-white); color: var(--u-black); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 110px; -webkit-font-smoothing: antialiased; }

        /* Login Persistente */
        #login-view { background: var(--u-black); color: white; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; display: none; flex-direction: column; justify-content: center; padding: 40px 25px; }
        #login-view.active { display: flex !important; }
        .login-brand { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; line-height: 0.9; margin-bottom: 40px; }

        /* SPA Views */
        .app-view { display: none; min-height: 100vh; }
        .app-view.active { display: block !important; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Header */
        .header-main { padding: 45px 20px 20px; background: white; border-bottom: 1px solid var(--u-border); position: sticky; top: 0; z-index: 100; }
        .header-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }

        /* Navigation */
        .u-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid var(--u-border); display: flex; justify-content: space-around; padding: 10px 0 35px; z-index: 1000; }
        .nav-item { color: #AFAFAF; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.65rem; font-weight: 600; border: none; background: none; }
        .nav-item.active { color: var(--u-black); }
        .nav-item i { font-size: 1.3rem; }

        /* Action Tiles */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .u-tile { background: var(--u-gray); border-radius: 12px; padding: 20px; height: 130px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; transition: 0.1s; }
        .u-tile:active { transform: scale(0.96); background: #EAEAEA; }
        .u-tile i { font-size: 1.5rem; color: var(--u-black); }
        .u-tile span { font-weight: 700; font-size: 0.95rem; }

        /* Uber Style Inputs */
        .u-label { font-size: 0.75rem; font-weight: 700; color: var(--u-text-gray); text-transform: uppercase; margin: 15px 0 6px; display: block; }
        .u-field { width: 100%; border: none; background: var(--u-gray); padding: 16px; border-radius: 8px; font-weight: 500; font-size: 1rem; margin-bottom: 5px; color: var(--u-black); }
        .u-field:focus { outline: 2px solid var(--u-black); background: white; }
        .btn-u { background: var(--u-black); color: white; border: none; width: 100%; padding: 18px; font-weight: 700; font-size: 1rem; border-radius: 8px; transition: 0.2s; }

        /* Map UI */
        .map-wrapper { position: relative; }
        .gps-btn { position: absolute; right: 12px; top: 14px; background: none; border: none; color: var(--u-blue); font-size: 1.2rem; z-index: 5; }
        #map { width: 100%; height: 350px; border-radius: 12px; }

        /* Stats Dashboard */
        .dash-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; background: var(--u-gray); }
        .metric-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--u-border); text-align: center; }
        .metric-val { font-size: 1.4rem; font-weight: 800; display: block; color: var(--u-black); }

        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; }
        .u-spinner { width: 35px; height: 35px; border: 4px solid var(--u-gray); border-top: 4px solid var(--u-black); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="u-spinner"></div><span class="mt-3 fw-800 small text-uppercase">Gravando Dados...</span></div>

<div id="login-view" class="app-view">
    <div class="login-brand">StateDrive<br>Pro.</div>
    <form id="loginForm">
        <input type="email" id="loginEmail" class="u-field" placeholder="Email corporativo" style="background: #222; color: white;" required>
        <button type="submit" class="btn-u mt-3" style="background: white; color: black;">Aceder</button>
    </form>
</div>

<div id="home-view" class="app-view">
    <div class="header-main d-flex justify-content-between align-items-center">
        <div class="header-title">Project ECHO</div>
        <div id="uAvatar" style="width: 42px; height: 42px; border-radius: 50%; background: #000; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem;"></div>
    </div>
    <div class="action-grid">
        <div class="u-tile" onclick="switchView('form-view'); navToStep(1);"><i class="fa-solid fa-car"></i><span>Nova Viagem</span></div>
        <div class="u-tile" onclick="switchView('maintenance-view')"><i class="fa-solid fa-screwdriver-wrench"></i><span>Manutenção</span></div>
        <div class="u-tile" onclick="switchView('incidents-view')"><i class="fa-solid fa-shield-heart" style="color: var(--u-red);"></i><span style="color: var(--u-red);">Ocorrência</span></div>
        <div class="u-tile" onclick="switchView('history-view'); loadRecentHistory();"><i class="fa-solid fa-chart-line"></i><span>Status</span></div>
    </div>
</div>

<div id="form-view" class="app-view">
    <div class="header-main py-3 border-0"><div class="d-flex align-items-center gap-3"><button class="border-0 bg-transparent p-0" onclick="switchView('home-view')"><i class="fa-solid fa-arrow-left fs-4"></i></button><div class="header-title fs-4" id="stepIndicator">Passo 1 de 3</div></div></div>
    
    <form id="logForm">
        <div id="step-1" class="p-3 step-view">
            <label class="u-label">Província</label>
            <select id="province" class="u-field" onchange="atualizarFrota('province', 'vehicle')" required>
                <option value="">Selecione...</option><option value="Maputo">Maputo</option><option value="Sofala">Sofala</option><option value="Manica">Manica</option><option value="Tete">Tete</option><option value="Niassa">Niassa</option>
            </select>
            <label class="u-label">Viatura</label>
            <select id="vehicle" class="u-field" disabled required></select>
            <div class="row g-2">
                <div class="col-6"><label class="u-label">KM Inicial</label><input type="number" id="kmI" class="u-field" oninput="calcDist()" required></div>
                <div class="col-6"><label class="u-label">KM Final</label><input type="number" id="kmF" class="u-field" oninput="calcDist()" required></div>
            </div>
            <div class="p-4 bg-light text-center rounded-3 mb-4 border"><span id="dispKm" class="fs-1 fw-800">0 KM</span></div>
            <button type="button" class="btn-u" onclick="navToStep(2)">Próximo</button>
        </div>

        <div id="step-2" class="p-3 step-view" style="display:none;">
            <div id="fuelList"></div>
            <button type="button" class="u-field border-dashed text-center bg-white" style="border: 2px dashed #DDD;" onclick="addFuel()">+ Adicionar Abastecimento</button>
            <div class="p-3 border rounded-3 mb-4 text-end"><span class="u-label">Total Gasto</span><div class="fs-3 fw-800"><span id="resM">0.00</span> MT</div></div>
            <button type="button" class="btn-u" onclick="navToStep(3)">Seguinte</button>
        </div>

        <div id="step-3" class="p-3 step-view" style="display:none;">
            <label class="u-label">Motorista</label><select id="driver" class="u-field" required></select>
            <label class="u-label">Tarefa (Task Code)</label><select id="task" class="u-field" required></select>
            <label class="u-label">Passageiro / Viajante</label><input type="text" id="passenger" class="u-field" required placeholder="Nome obrigatório">
            
            <label class="u-label">Origem (GPS)</label>
            <div class="map-wrapper mb-2">
                <input type="text" id="ori" class="u-field pe-5" placeholder="Clique no GPS..." required>
                <button type="button" class="gps-btn" onclick="openMapModal('ori')"><i class="fa-solid fa-location-crosshairs"></i></button>
            </div>
            <label class="u-label">Destino (GPS)</label>
            <div class="map-wrapper mb-3">
                <input type="text" id="des" class="u-field pe-5" placeholder="Clique no GPS..." required>
                <button type="button" class="gps-btn" onclick="openMapModal('des')"><i class="fa-solid fa-map-pin"></i></button>
            </div>
            <button type="submit" class="btn-u mt-3" style="background: var(--u-green);">Gravar Viagem</button>
        </div>
    </form>
</div>

<div id="maintenance-view" class="app-view">
    <div class="header-main py-3"><button class="border-0 bg-transparent p-0 mb-2" onclick="switchView('home-view')"><i class="fa-solid fa-arrow-left fs-4"></i></button><div class="header-title fs-4">Manutenção</div></div>
    <form id="maintForm" class="p-3">
        <label class="u-label">Viatura</label><select id="maintVehicle" class="u-field" required></select>
        <label class="u-label">Tipo Serviço</label><select id="maintType" class="u-field" required><option value="Óleo">Mudança Óleo</option><option value="Revisão">Revisão Geral</option><option value="Reparação">Reparação Avaria</option></select>
        <div class="row g-2">
            <div class="col-6"><label class="u-label">KM Atual</label><input type="number" id="maintKm" class="u-field" required></div>
            <div class="col-6"><label class="u-label">Custo MT</label><input type="number" id="maintCost" class="u-field" required></div>
        </div>
        <label class="u-label">Próxima Revisão</label><input type="date" id="maintNext" class="u-field" required>
        <button type="submit" class="btn-u mt-4">Registar na DB_maintenance</button>
    </form>
</div>

<div id="incidents-view" class="app-view">
    <div class="header-main py-3"><button class="border-0 bg-transparent p-0 mb-2" onclick="switchView('home-view')"><i class="fa-solid fa-arrow-left fs-4"></i></button><div class="header-title fs-4 text-danger">Reportar Ocorrência</div></div>
    <form id="incidentForm" class="p-3">
        <label class="u-label">Contexto</label>
        <div class="row g-2 mb-3">
            <div class="col-6"><select id="incProvince" class="u-field" onchange="atualizarFrota('incProvince', 'incVehicle')" required><option value="">Província...</option><option value="Maputo">Maputo</option><option value="Sofala">Sofala</option><option value="Manica">Manica</option><option value="Tete">Tete</option><option value="Niassa">Niassa</option></select></div>
            <div class="col-6"><select id="incVehicle" class="u-field" disabled required></select></div>
        </div>
        <label class="u-label">Relato</label><textarea id="incDesc" class="u-field" rows="3" required placeholder="Descrição detalhada..."></textarea>
        <label class="u-label">Evidência (Upload ImgBB)</label><input type="file" id="incPhoto" class="u-field" accept="image/*" capture="environment" required>
        <button type="submit" class="btn-u mt-4" style="background: var(--u-red);">Enviar Emergência</button>
    </form>
</div>

<div id="history-view" class="app-view">
    <div class="header-main py-3"><div class="header-title fs-4">Estatísticas</div></div>
    <div class="dash-container">
        <div class="metric-card"><span class="metric-label">KM Totais</span><span id="dashKm" class="metric-val">0</span></div>
        <div class="metric-card"><span class="metric-label">Viagens</span><span id="dashTrips" class="metric-val">0</span></div>
    </div>
    <div class="p-3">
        <label class="u-label mb-3">Gasto Combustível por Província</label>
        <div style="height: 220px;"><canvas id="expenseChart"></canvas></div>
        <label class="u-label mt-4">Actividade Recente</label>
        <div id="historicoList"></div>
    </div>
</div>

<div id="account-view" class="app-view">
    <div class="header-main py-4 text-center border-0">
        <div id="uAvatarBig" class="mx-auto mb-3" style="width: 80px; height: 80px; border-radius: 50%; background: #000; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 2rem;"></div>
        <h4 id="uEmailText" class="fw-bold mb-0">Utilizador ECHO</h4>
        <button class="btn btn-dark btn-sm mt-3 px-4" onclick="logout()" style="border-radius: 20px;">Sair</button>
    </div>
    <div class="p-3">
        <label class="u-label">Ajuda & FAQ</label>
        <div class="accordion accordion-flush" id="faqAcc">
            <div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed fw-bold" data-bs-toggle="collapse" data-bs-target="#f1">Dados incorretos?</button></h2><div id="f1" class="accordion-collapse collapse p-3 small text-secondary">Ajustes só podem ser feitos manualmente na Google Sheet.</div></div>
        </div>
    </div>
</div>

<div class="modal fade" id="mapModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg"><div id="map"></div><div class="p-3 text-center"><button class="btn-u" onclick="confirmLocation()">Confirmar Morada</button></div></div></div></div>

<div class="u-nav" id="mainNav">
    <button class="nav-item active" onclick="switchView('home-view')"><i class="fa-solid fa-house"></i>Início</button>
    <button class="nav-item" onclick="switchView('form-view')"><i class="fa-solid fa-car-side"></i>Viagem</button>
    <button class="nav-item" onclick="switchView('history-view'); loadRecentHistory();"><i class="fa-solid fa-chart-pie"></i>Status</button>
    <button class="nav-item" onclick="switchView('account-view')"><i class="fa-solid fa-user-circle"></i>Conta</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const IMGBB_KEY = '752f66aaa3afa895ee81d09b023b226a';
    const motoristas = ["Agostinho Mujanda", "Alberto Barros", "Arlindo Cossa", "Carlos Mirassy", "Carlos Saboia"];
    const frota = { "Sofala": ["AEA-596-MP (Ford)", "AGD-259-MC (Hilux)", "AGG-921-MC (Hilux)"], "Niassa": ["ABY-323-MP (Cruiser)", "AGD-264-MC (Hilux)"], "Tete": ["AGG-919-MC (Hilux)", "AGG-924-MC (Hilux)"], "Manica": ["AGQ-261-MC (Hilux)", "AJV-250-MC (Cruiser)"], "Maputo": ["AFX-797-MP (Fortuner)"] };
    
    let map, marker, geocoder, activeInput, expenseChartInstance = null;

    // --- SISTEMA SPA ---
    function switchView(id) {
        document.getElementById('mainNav').style.display = (id === 'login-view') ? 'none' : 'flex';
        document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.toLowerCase().includes(id.replace('-view','').replace('account','conta').replace('history','status'))) btn.classList.add('active');
        });
        window.scrollTo(0,0);
    }

    // --- GOOGLE MAPS ---
    function initMap() {
        geocoder = new google.maps.Geocoder();
        map = new google.maps.Map(document.getElementById('map'), { center: {lat:-25.9, lng:32.5}, zoom: 15, disableDefaultUI: true });
        marker = new google.maps.Marker({ map: map, draggable: true });
    }
    function openMapModal(inputId) {
        activeInput = inputId;
        new bootstrap.Modal(document.getElementById('mapModal')).show();
        if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p => {
            const pos = {lat: p.coords.latitude, lng: p.coords.longitude};
            map.setCenter(pos); marker.setPosition(pos);
        });
    }
    function confirmLocation() {
        const pos = marker.getPosition();
        geocoder.geocode({location: pos}, (res) => {
            if(res[0]) document.getElementById(activeInput).value = res[0].formatted_address;
            bootstrap.Modal.getInstance(document.getElementById('mapModal')).hide();
        });
    }

    // --- CORE ---
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('driver').innerHTML = '<option value="">Motorista...</option>' + motoristas.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('task').innerHTML = '<option value="">Tarefa...</option>' + [1010, 2010, 3010, 9999].map(t => `<option value="${t}">${t}</option>`).join('');
        Object.values(frota).flat().forEach(v => { document.getElementById('maintVehicle').add(new Option(v,v)); });

        const email = localStorage.getItem('echo_user_email');
        if (email) {
            document.getElementById('uAvatar').innerText = email.charAt(0).toUpperCase();
            document.getElementById('uAvatarBig').innerText = email.charAt(0).toUpperCase();
            document.getElementById('uEmailText').innerText = email;
            switchView('home-view');
        } else { switchView('login-view'); }
    });

    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        localStorage.setItem('echo_user_email', document.getElementById('loginEmail').value);
        location.reload();
    };

    function logout() { localStorage.removeItem('echo_user_email'); location.reload(); }
    function navToStep(step) {
        document.getElementById('stepIndicator').innerText = `Passo ${step} de 3`;
        document.querySelectorAll('.step-view').forEach(s => s.style.display = 'none');
        document.getElementById(`step-${step}`).style.display = 'block';
    }
    function atualizarFrota(idProv, idVeh) {
        const prov = document.getElementById(idProv).value;
        const sel = document.getElementById(idVeh);
        sel.innerHTML = '<option value="">Viatura...</option>';
        if (prov && frota[prov]) { sel.disabled = false; frota[prov].forEach(v => sel.add(new Option(v,v))); } else { sel.disabled = true; }
    }
    function calcDist() {
        const i = parseFloat(document.getElementById('kmI').value) || 0;
        const f = parseFloat(document.getElementById('kmF').value) || 0;
        document.getElementById('dispKm').innerText = (f - i > 0 ? f - i : 0) + " KM";
    }
    function addFuel() {
        const div = document.createElement('div'); div.className = 'bg-light p-3 rounded-3 mb-3 position-relative fuel-entry';
        div.innerHTML = `<button type="button" class="btn-close position-absolute top-0 end-0 m-2" onclick="this.parentElement.remove();sumFuel()"></button>
            <div class="row g-2"><div class="col-6"><label class="u-label">Lts</label><input type="number" step="0.01" class="u-field f-l" oninput="sumFuel()"></div><div class="col-6"><label class="u-label">MT/L</label><input type="number" step="0.01" class="u-field f-p" value="90.50" oninput="sumFuel()"></div></div>`;
        document.getElementById('fuelList').appendChild(div);
    }
    function sumFuel() {
        let total = 0; document.querySelectorAll('.fuel-entry').forEach(r => total += (parseFloat(r.querySelector('.f-l').value) || 0) * (parseFloat(r.querySelector('.f-p').value) || 0));
        document.getElementById('resM').innerText = total.toFixed(2);
    }

    // --- VERCEL SUBMISSIONS ---
    document.getElementById('logForm').onsubmit = async (e) => {
        e.preventDefault(); document.getElementById('loader').style.display = 'flex';
        let fuel = []; document.querySelectorAll('.fuel-entry').forEach(r => {
            const l = parseFloat(r.querySelector('.f-l').value); const p = parseFloat(r.querySelector('.f-p').value);
            if(l > 0) fuel.push({ litros: l, precoPorLitro: p, custoTotal: (l*p) });
        });
        const data = { action: 'logbook', submetidoPor: localStorage.getItem('echo_user_email'), motorista: document.getElementById('driver').value, viatura: document.getElementById('vehicle').value, provincia: document.getElementById('province').value, kmInicial: document.getElementById('kmI').value, kmFinal: document.getElementById('kmF').value, passageiro: document.getElementById('passenger').value, origem: document.getElementById('ori').value, destino: document.getElementById('des').value, taskCode: document.getElementById('task').value, abastecimentos: fuel };
        try { await fetch('/api/save-entry', { method: 'POST', body: JSON.stringify(data), headers: {'Content-Type': 'application/json'} }); alert('Gravado!'); location.reload(); } catch(e) { alert('Erro na Cloud'); }
        document.getElementById('loader').style.display = 'none';
    };

    document.getElementById('incidentForm').onsubmit = async (e) => {
        e.preventDefault(); document.getElementById('loader').style.display = 'flex';
        let url = "Sem Foto"; const file = document.getElementById('incPhoto').files[0];
        if(file) {
            const fd = new FormData(); fd.append('image', file);
            const resI = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const jsonI = await resI.json(); if(jsonI.success) url = jsonI.data.url;
        }
        const data = { action: 'incident', submetidoPor: localStorage.getItem('echo_user_email'), provincia: document.getElementById('incProvince').value, viatura: document.getElementById('incVehicle').value, descricao: document.getElementById('incDesc').value, foto: url };
        try { await fetch('/api/save-entry', { method: 'POST', body: JSON.stringify(data), headers: {'Content-Type': 'application/json'} }); alert('Ocorrência Gravada!'); location.reload(); } catch(e) {}
        document.getElementById('loader').style.display = 'none';
    };

    document.getElementById('maintForm').onsubmit = async (e) => {
        e.preventDefault(); document.getElementById('loader').style.display = 'flex';
        const data = { action: 'maintenance', submetidoPor: localStorage.getItem('echo_user_email'), viatura: document.getElementById('maintVehicle').value, kmActuais: document.getElementById('maintKm').value, custo: document.getElementById('maintCost').value, proximaRevisao: document.getElementById('maintNext').value };
        try { await fetch('/api/save-entry', { method: 'POST', body: JSON.stringify(data), headers: {'Content-Type': 'application/json'} }); alert('Manutenção Gravada!'); location.reload(); } catch(e) {}
        document.getElementById('loader').style.display = 'none';
    };

    // --- DASHBOARD ---
    async function loadRecentHistory() {
        const list = document.getElementById('historicoList');
        list.innerHTML = '<div class="text-center py-5"><div class="u-spinner mx-auto"></div></div>';
        try {
            const res = await fetch('/api/get-history');
            const data = await res.json();
            if (data.status === 'success') {
                let tk = 0; let exp = { "Maputo": 0, "Sofala": 0, "Manica": 0, "Tete": 0, "Niassa": 0 };
                list.innerHTML = data.history.map(h => {
                    const diff = (parseFloat(h['KM Final']) - parseFloat(h['KM Inicial'])) || 0; tk += diff;
                    try { JSON.parse(h.Abastecimentos || '[]').forEach(f => { if(exp[h.Província] !== undefined) exp[h.Província] += f.custoTotal; }); } catch(err) {}
                    return `<div class="p-3 bg-white rounded-3 mb-2 border d-flex justify-content-between align-items-center"><div><b>${h.Motorista}</b><br><small>${h.Timestamp.substring(0,10)} • ${h.Viatura}</small></div><b>+${diff} KM</b></div>`;
                }).join('');
                document.getElementById('dashKm').innerText = tk;
                document.getElementById('dashTrips').innerText = data.history.length;
                renderChart(exp);
            }
        } catch(e) { list.innerHTML = '<p class="text-center p-4">Erro ao sincronizar com Google Sheets.</p>'; }
    }

    function renderChart(dataObj) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if(expenseChartInstance) expenseChartInstance.destroy();
        expenseChartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.keys(dataObj), datasets: [{ label: 'MZN', data: Object.values(dataObj), backgroundColor: '#000', borderRadius: 6 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } } }
        });
    }

    function initMap() {}
</script>
</body>
</html>
