<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO Drive Pro - Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --uber-black: #050505; --uber-blue: #276ef1; --card-bg: #121212; --input-bg: #1f1f1f; --text-gray: #a6a6a6; }
        body { background-color: var(--uber-black); color: white; font-family: 'Inter', sans-serif; padding-bottom: 110px; }
        .app-header { padding: 30px 20px 10px; background: var(--uber-black); }
        .nav-pills { background: #1a1a1a; margin: 0 20px 20px; border-radius: 50px; padding: 5px; border: 1px solid #333; }
        .nav-pills .nav-link { color: var(--text-gray); border-radius: 50px; font-weight: 600; font-size: 0.75rem; border: none; }
        .nav-pills .nav-link.active { background-color: white; color: black; }
        .form-card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin: 0 15px 15px; border: 1px solid #222; position: relative; }
        .form-label { color: var(--text-gray); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .form-control, .form-select { background-color: var(--input-bg); border: 1px solid #333; color: white; border-radius: 12px; padding: 12px; margin-bottom: 15px; font-size: 0.9rem; }
        .vehicle-thumb-container { position: absolute; top: 15px; right: 15px; width: 60px; height: 40px; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        #vehicleThumb { max-width: 80%; max-height: 80%; opacity: 0; transition: 0.3s; }
        .fuel-entry { background: #181818; border-radius: 16px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--uber-blue); position: relative; }
        .remove-entry { position: absolute; top: 8px; right: 12px; color: #ff4d4d; font-size: 1.2rem; cursor: pointer; }
        .btn-add { background: transparent; border: 1px dashed var(--uber-blue); color: var(--uber-blue); width: 100%; padding: 12px; border-radius: 12px; font-weight: 600; margin-bottom: 10px; }
        .fixed-bottom-btn { position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 1000; }
        .btn-uber { background-color: var(--uber-blue); color: white; border: none; border-radius: 16px; padding: 18px; width: 100%; font-weight: 700; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner-border text-primary"></div>
    <span class="mt-3 fw-bold small">PROCESSANDO LOGBOOK...</span>
</div>

<div class="app-header text-center">
    <h1 class="fw-bold h4 mb-0">ECHO <span style="color: var(--uber-blue);">Drive</span></h1>
    <p class="text-secondary small">Sistema de Auditoria de Frota</p>
</div>

<ul class="nav nav-pills nav-justified" id="pills-tab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-1">VIAGEM</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-2">COMBUSTÍVEL</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-3">MISSÃO</button></li>
</ul>

<form id="logForm">
    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-1">
            <div class="form-card">
                <div class="vehicle-thumb-container"><img id="vehicleThumb" src="" alt=""></div>
                <label class="form-label">Motorista</label>
                <select id="driver" class="form-select" required>
                    <option value="">Seleccione...</option>
                    <option>Agostinho Mujanda</option><option>Alberto Barros</option><option>Arlindo Cossa</option>
                    <option>Bernardo Nsicuzinaimue</option><option>Carlos Mirassy</option><option>Carlos Saboia</option>
                </select>

                <label class="form-label">Província</label>
                <select id="province" class="form-select" onchange="atualizarFrota(); sugerirPrecoCombustivel()" required>
                    <option value="">Seleccione a região...</option>
                    <option value="Maputo">Maputo</option>
                    <option value="Sofala">Sofala</option>
                    <option value="Manica">Manica</option>
                    <option value="Tete">Tete</option>
                    <option value="Niassa">Niassa</option>
                </select>

                <label class="form-label">Viatura</label>
                <select id="vehicle" class="form-select" disabled required onchange="updateThumb()"></select>

                <div class="row">
                    <div class="col-6"><label class="form-label">Partida</label><input type="datetime-local" id="dataPartida" class="form-control" onchange="validarDatas()" required></div>
                    <div class="col-6"><label class="form-label">Chegada</label><input type="datetime-local" id="dataChegada" class="form-control" onchange="validarDatas()" required></div>
                </div>

                <div class="row">
                    <div class="col-6"><label class="form-label">KM Inicial</label><input type="number" id="kmI" class="form-control" inputmode="numeric" required></div>
                    <div class="col-6"><label class="form-label">KM Final</label><input type="number" id="kmF" class="form-control" inputmode="numeric" required></div>
                </div>
            </div>
            <div class="fixed-bottom-btn"><button type="button" class="btn-uber" onclick="goTo('tab-2')">CONTINUAR</button></div>
        </div>

        <div class="tab-pane fade" id="tab-2">
            <div class="form-card">
                <div id="fuelContainer"></div>
                <button type="button" class="btn-add" onclick="addFuelEntry()">+ ADICIONAR ABASTECIMENTO</button>
                <div class="mt-2 text-end">
                    <small class="text-secondary d-block">Total Litros: <span id="totalLitros" class="text-white fw-bold">0.00</span> L</small>
                    <small class="text-secondary d-block">Custo Total: <span id="totalMoney" class="text-white fw-bold">0.00</span> MZN</small>
                </div>
            </div>
            <div class="fixed-bottom-btn"><button type="button" class="btn-uber" onclick="goTo('tab-3')">DADOS DA EQUIPA</button></div>
        </div>

        <div class="tab-pane fade" id="tab-3">
            <div class="form-card">
                <label class="form-label">Passageiro (Nome | Email)</label>
                <input class="form-control" list="staffList" id="passenger" placeholder="Pesquisar utilizador...">
                <datalist id="staffList">
                    <option value="Julio Pacca | Julio.Pacca@abtglobal.com">
                    <option value="Vânia Macome | Vania_Macome@echomoz.org">
                </datalist>

                <label class="form-label">Task Code</label>
                <select id="task" class="form-select" required>
                    <script> [2010,2020,4010,4020].forEach(c => document.write(`<option>${c}</option>`)); </script>
                </select>

                <div class="row">
                    <div class="col-6"><label class="form-label">Origem</label><input type="text" class="form-control" placeholder="Cidade A"></div>
                    <div class="col-6"><label class="form-label">Destino</label><input type="text" class="form-control" placeholder="Cidade B"></div>
                </div>

                <label class="form-label">Propósito</label>
                <textarea class="form-control" rows="2" placeholder="Notas da missão..."></textarea>
            </div>
            <div class="fixed-bottom-btn"><button type="submit" class="btn-uber" style="background:white; color:black;">SUBMETER PARA AUDITORIA</button></div>
        </div>
    </div>
</form>

<script>
    const frota = {
        "Sofala": ["AEA-596-MP (Ford)", "AGG-921-MC (Hilux)"],
        "Maputo": ["AFX-797-MP (Fortuner)"],
        "Tete": ["AGG-919-MC (Hilux)"]
    };

    const tabelaPrecos = { "Maputo": 89.15, "Sofala": 90.50, "Manica": 91.20, "Tete": 92.40, "Niassa": 94.80 };
    const icons = { "Hilux": "https://prowars.info/wp-content/uploads/2020/09/hilux-icon.png", "Ford": "https://www.pngall.com/wp-content/uploads/2/Ford-Ranger-PNG-Clipart.png", "default": "https://cdn-icons-png.flaticon.com/512/744/744465.png" };

    let fuelCount = 0;

    function atualizarFrota() {
        const p = document.getElementById("province").value;
        const s = document.getElementById("vehicle");
        s.innerHTML = '<option value="">Seleccione...</option>';
        if(p && frota[p]) { s.disabled = false; frota[p].forEach(v => s.add(new Option(v, v))); }
        else { s.disabled = true; }
    }

    function sugerirPrecoCombustivel() {
        const prov = document.getElementById("province").value;
        const preco = tabelaPrecos[prov] || 89.15;
        document.querySelectorAll('.fuel-p').forEach(input => { if(!input.value) input.value = preco; });
        updateTotals();
    }

    function updateThumb() {
        const v = document.getElementById("vehicle").value;
        const img = document.getElementById("vehicleThumb");
        let m = v.includes("Hilux") ? "Hilux" : (v.includes("Ford") ? "Ford" : "default");
        img.src = icons[m]; img.style.opacity = "1";
    }

    function validarDatas() {
        const p = new Date(document.getElementById('dataPartida').value);
        const c = new Date(document.getElementById('dataChegada').value);
        if (p && c && c < p) { alert("⚠️ Chegada não pode ser antes da partida!"); document.getElementById('dataChegada').value = ""; }
    }

    function addFuelEntry() {
        fuelCount++;
        const div = document.createElement('div');
        div.className = 'fuel-entry';
        div.id = `f-${fuelCount}`;
        div.innerHTML = `<span class="remove-entry" onclick="this.parentElement.remove();updateTotals()">&times;</span>
            <div class="row g-2">
                <div class="col-4"><label class="form-label small">Litros</label><input type="number" step="0.01" class="form-control fuel-l" oninput="updateTotals()" inputmode="decimal"></div>
                <div class="col-4"><label class="form-label small">MZN/L</label><input type="number" step="0.01" class="form-control fuel-p" oninput="updateTotals()" inputmode="decimal"></div>
                <div class="col-4"><label class="form-label small">KM Acto</label><input type="number" class="form-control" inputmode="numeric"></div>
            </div>`;
        document.getElementById('fuelContainer').appendChild(div);
        sugerirPrecoCombustivel();
    }

    function updateTotals() {
        let lT = 0, mT = 0;
        document.querySelectorAll('.fuel-entry').forEach(e => {
            const l = parseFloat(e.querySelector('.fuel-l').value) || 0;
            const p = parseFloat(e.querySelector('.fuel-p').value) || 0;
            lT += l; mT += (l * p);
        });
        document.getElementById('totalLitros').innerText = lT.toFixed(2);
        document.getElementById('totalMoney').innerText = mT.toLocaleString('pt-MZ');
    }

    function goTo(id) { new bootstrap.Tab(document.querySelector(`button[data-bs-target="#${id}"]`)).show(); window.scrollTo(0,0); }

    document.getElementById('logForm').onsubmit = (e) => {
        e.preventDefault();
        document.getElementById('loader').style.display = 'flex';
        setTimeout(() => { alert('SUCESSO! LogBook enviado.'); location.reload(); }, 2000);
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
