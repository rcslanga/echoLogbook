<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO Drive Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBIJPWtg4ruD7z9f1OGltvFFVPQBqa8eGQ&libraries=places"></script>

    <style>
        :root { --uber-black: #000000; --uber-white: #ffffff; --uber-blue: #276ef1; --card-dark: #121212; --input-bg: #1f1f1f; }
        body { background-color: var(--uber-black); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* SPA Navigation */
        .app-view { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
        .app-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Landing Page */
        .home-header { padding: 60px 25px 30px; }
        .uber-logo { font-size: 2.5rem; font-weight: 800; letter-spacing: -1.5px; }
        .uber-logo span { color: var(--uber-blue); }
        .main-btn { background: white; color: black; border-radius: 18px; padding: 25px; margin-bottom: 20px; border: none; display: flex; align-items: center; width: 100%; transition: 0.2s; }
        .main-btn i { font-size: 1.5rem; margin-right: 15px; color: var(--uber-blue); }

        /* Form Elements */
        .form-card { background: var(--card-dark); border-radius: 20px; padding: 20px; margin: 0 15px 20px; border: 1px solid #222; }
        .form-label { color: #888; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .form-control { background: var(--input-bg); border: 1px solid #333; color: white; border-radius: 12px; padding: 12px; }
        
        /* Map Customization */
        #mapCanvas { width: 100%; height: 400px; border-radius: 0 0 15px 15px; }
        .modal-content { background: var(--card-dark); border: 1px solid #333; border-radius: 25px; overflow: hidden; }
        .input-group-text { background: #222; border: 1px solid #333; color: var(--uber-blue); cursor: pointer; border-radius: 0 12px 12px 0 !important; }

        .btn-uber-next { background: var(--uber-blue); color: white; border: none; border-radius: 15px; padding: 18px; width: 100%; font-weight: 700; }
    </style>
</head>
<body>

<div id="view-home" class="app-view active">
    <div class="home-header">
        <div class="uber-logo">ECHO<span>Drive</span></div>
        <p class="text-secondary small">Gestão de Logbook e Frotas</p>
    </div>
    <div class="px-4">
        <button class="main-btn" onclick="openView('view-form')">
            <i class="fas fa-plus-circle"></i>
            <div class="text-start"><b>Nova Viagem</b><br><small class="text-muted">Registo de saída e custos</small></div>
        </button>
        <button class="main-btn" onclick="openView('view-history')">
            <i class="fas fa-history"></i>
            <div class="text-start"><b>Histórico</b><br><small class="text-muted">Consultar registos anteriores</small></div>
        </button>
    </div>
</div>

<div id="view-form" class="app-view">
    <div class="p-3 d-flex align-items-center border-bottom border-dark">
        <button class="btn text-white me-2" onclick="openView('view-home')"><i class="fas fa-arrow-left"></i></button>
        <span class="fw-bold">Novo Registo</span>
    </div>

    <form id="logForm" class="mt-3">
        <div class="form-card">
            <label class="form-label text-primary">Geolocalização</label>
            
            <div class="mb-3">
                <label class="small text-muted mb-1">Origem</label>
                <div class="input-group">
                    <input type="text" id="ori" class="form-control" placeholder="Local de saída">
                    <span class="input-group-text" onclick="launchMap('ori')"><i class="fas fa-map-marked-alt"></i></span>
                </div>
            </div>

            <div class="mb-2">
                <label class="small text-muted mb-1">Destino</label>
                <div class="input-group">
                    <input type="text" id="des" class="form-control" placeholder="Local de chegada">
                    <span class="input-group-text" onclick="launchMap('des')"><i class="fas fa-map-marked-alt"></i></span>
                </div>
            </div>
        </div>

        <div class="form-card">
            <label class="form-label">Detalhes da Viagem</label>
            <div class="row g-2">
                <div class="col-6"><label class="small text-muted">KM Inicial</label><input type="number" class="form-control" id="kmI"></div>
                <div class="col-6"><label class="small text-muted">KM Final</label><input type="number" class="form-control" id="kmF"></div>
            </div>
        </div>

        <div class="p-3"><button type="submit" class="btn-uber-next">SUBMETER DADOS</button></div>
    </form>
</div>

<div class="modal fade" id="mapModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="p-3 d-flex justify-content-between align-items-center">
                <h6 class="m-0 fw-bold text-white">Marcar Localização</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div id="mapCanvas"></div>
            <div class="p-3">
                <button type="button" class="btn btn-primary w-100 fw-bold" onclick="confirmLocation()" style="border-radius:12px;">CONFIRMAR ESTE LOCAL</button>
            </div>
        </div>
    </div>
</div>

<script>
    let map, marker, activeField;

    function openView(id) {
        document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    // Inicializa o Mapa no Modal
    function launchMap(fieldId) {
        activeField = fieldId;
        const myModal = new bootstrap.Modal(document.getElementById('mapModal'));
        myModal.show();

        // Aguarda animação do modal para carregar o mapa
        setTimeout(() => {
            const defaultPos = { lat: -25.96, lng: 32.58 }; // Moçambique
            
            map = new google.maps.Map(document.getElementById("mapCanvas"), {
                center: defaultPos,
                zoom: 15,
                disableDefaultUI: true,
                mapId: 'DEMO_MAP_ID' 
            });

            marker = new google.maps.Marker({
                position: defaultPos,
                map: map,
                draggable: true,
                animation: google.maps.Animation.DROP
            });

            // GPS do Telemóvel
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const myLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    map.setCenter(myLoc);
                    marker.setPosition(myLoc);
                });
            }
        }, 400);
    }

    function confirmLocation() {
        const pos = marker.getPosition();
        const geocoder = new google.maps.Geocoder();
        
        geocoder.geocode({ location: pos }, (results, status) => {
            if (status === "OK" && results[0]) {
                document.getElementById(activeField).value = results[0].formatted_address;
            } else {
                // Se estiver offline ou sem dados, guarda a coordenada pura
                document.getElementById(activeField).value = pos.lat().toFixed(5) + ", " + pos.lng().toFixed(5);
            }
            bootstrap.Modal.getInstance(document.getElementById('mapModal')).hide();
        });
    }

    document.getElementById('logForm').onsubmit = (e) => {
        e.preventDefault();
        alert('Dados salvos localmente! Pronto para enviar para a Cloud.');
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
