<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StateDrive Pro | Recovery Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBIJPWtg4ruD7z9f1OGltvFFVPQBqa8eGQ&libraries=places&callback=initMap" async defer></script>

    <style>
        :root { --u-black: #000; --u-white: #fff; --u-gray: #F6F6F6; }
        body { background: var(--u-white); font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .app-view { display: none; min-height: 100vh; }
        .app-view.active { display: block !important; }
        .header-main { padding: 45px 20px 20px; border-bottom: 1px solid #EEE; position: sticky; top: 0; background: #fff; z-index: 100; }
        .u-field { width: 100%; border: none; background: var(--u-gray); padding: 16px; border-radius: 8px; margin-bottom: 10px; }
        .btn-u { background: var(--u-black); color: #fff; border: none; width: 100%; padding: 18px; font-weight: 700; border-radius: 8px; }
        .u-nav { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #EEE; display: flex; justify-content: space-around; padding: 10px 0 35px; }
        .nav-item { color: #AFAFAF; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; border: none; background: none; }
        .nav-item.active { color: #000; }
        #map { width: 100%; height: 300px; border-radius: 12px; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner-border text-dark"></div><span class="mt-3 fw-800 small">GRAVANDO NA CLOUD...</span></div>

<div id="login-view" class="app-view">
    <div class="p-5 d-flex flex-column justify-content-center h-100" style="background:#000; color:#fff; position:fixed; width:100%; height:100%; z-index:10000;">
        <h1 class="display-3 fw-800 mb-5">StateDrive.</h1>
        <form id="loginForm">
            <input type="email" id="loginEmail" class="u-field mb-3" placeholder="Email corporativo" style="background:#222; color:#fff;" required>
            <button type="submit" class="btn-u" style="background:#fff; color:#000;">ENTRAR</button>
        </form>
    </div>
</div>

<div id="home-view" class="app-view">
    <div class="header-main d-flex justify-content-between align-items-center">
        <h1 class="fw-800 fs-3">Project ECHO</h1>
        <div id="uAvatar" class="rounded-circle bg-dark text-white d-flex align-items-center justify-content-center fw-bold" style="width:40px; height:40px;"></div>
    </div>
    <div class="p-3 d-grid" style="grid-template-columns: 1fr 1fr; gap:12px;">
        <div class="p-4 bg-light rounded-3 text-center" onclick="switchView('form-view'); navTo(1);"><i class="fa-solid fa-car fa-2x mb-2"></i><br><b>Viagem</b></div>
        <div class="p-4 bg-light rounded-3 text-center" onclick="switchView('maintenance-view')"><i class="fa-solid fa-wrench fa-2x mb-2"></i><br><b>Oficina</b></div>
        <div class="p-4 bg-light rounded-3 text-center" onclick="switchView('incidents-view')"><i class="fa-solid fa-triangle-exclamation fa-2x mb-2 text-danger"></i><br><b class="text-danger">Incidente</b></div>
        <div class="p-4 bg-light rounded-3 text-center" onclick="switchView('history-view'); loadRecentHistory();"><i class="fa-solid fa-chart-pie fa-2x mb-2"></i><br><b>Status</b></div>
    </div>
</div>

<div id="form-view" class="app-view">
    <div class="header-main"><h2 class="fw-800 fs-4" id="stepTitle">Passo 1</h2></div>
    <form id="logForm" class="p-3">
        <div id="step-1" class="step-group">
            <select id="province" class="u-field" onchange="atualizarFrota('province', 'vehicle')" required>
                <option value="">Província...</option><option value="Maputo">Maputo</option><option value="Sofala">Sofala</option><option value="Manica">Manica</option><option value="Tete">Tete</option><option value="Niassa">Niassa</option>
            </select>
            <select id="vehicle" class="u-field" disabled required></select>
            <div class="row g-2">
                <div class="col-6"><input type="number" id="kmI" class="u-field" placeholder="KM Inicial" oninput="calcDist()"></div>
                <div class="col-6"><input type="number" id="kmF" class="u-field" placeholder="KM Final" oninput="calcDist()"></div>
            </div>
            <div class="p-4 bg-dark text-white text-center rounded-3 mb-3"><span id="dispKm" class="fs-1 fw-800">0 KM</span></div>
            <button type="button" class="btn-u" onclick="navTo(2)">Próximo</button>
        </div>
        <div id="step-2" class="step-group" style="display:none;">
            <div id="fuelList"></div>
            <button type="button" class="u-field border bg-white mb-3" onclick="addFuel()">+ Adicionar Recibo</button>
            <button type="button" class="btn-u" onclick="navTo(3)">Seguinte</button>
        </div>
        <div id="step-3" class="step-group" style="display:none;">
            <select id="driver" class="u-field mb-2" required></select>
            <input type="text" id="passenger" class="u-field mb-2" placeholder="Passageiro Responsável" required>
            <input type="text" id="ori" class="u-field mb-2" placeholder="Origem (Clique GPS)" onclick="openMapModal('ori')" readonly>
            <input type="text" id="des" class="u-field mb-3" placeholder="Destino (Clique GPS)" onclick="openMapModal('des')" readonly>
            <button type="submit" class="btn-u" style="background:var(--u-green) !important;">GRAVAR VIAGEM</button>
        </div>
    </form>
</div>

<div id="maintenance-view" class="app-view">
    <div class="header-main"><h2 class="fw-800 fs-4">Oficina</h2></div>
    <form id="maintForm" class="p-3">
        <select id="maintVehicle" class="u-field" required></select>
        <select id="maintType" class="u-field"><option value="Revisão">Revisão</option><option value="Pneus">Pneus</option><option value="Avaria">Avaria</option></select>
        <input type="number" id="maintKm" class="u-field" placeholder="KM Atual">
        <input type="number" id="maintCost" class="u-field" placeholder="Custo MT">
        <input type="date" id="maintNext" class="u-field">
        <button type="submit" class="btn-u mt-3">GRAVAR MANUTENÇÃO</button>
    </form>
</div>

<div id="incidents-view" class="app-view">
    <div class="header-main"><h2 class="fw-800 fs-4 text-danger">Incidente</h2></div>
    <form id="incidentForm" class="p-3">
        <select id="incProvince" class="u-field" onchange="atualizarFrota('incProvince', 'incVehicle')" required>
            <option value="">Província...</option><option value="Maputo">Maputo</option><option value="Sofala">Sofala</option><option value="Manica">Manica</option><option value="Tete">Tete</option><option value="Niassa">Niassa</option>
        </select>
        <select id="incVehicle" class="u-field mb-2" disabled required></select>
        <select id="incDriver" class="u-field mb-2" required></select>
        <select id="incType" class="u-field mb-2"><option value="Acidente">Acidente</option><option value="Avaria">Avaria</option><option value="Furo">Furo</option></select>
        <select id="incUrgency" class="u-field mb-2"><option value="Baixa">Baixa</option><option value="Média">Média</option><option value="Crítica">Crítica</option></select>
        <input type="text" id="incLoc" class="u-field mb-2" placeholder="Localização (GPS)" onclick="openMapModal('incLoc')" readonly>
        <textarea id="incDesc" class="u-field" rows="3" placeholder="Descrição..."></textarea>
        <input type="file" id="incPhoto" class="u-field" accept="image/*" capture="environment">
        <button type="submit" class="btn-u bg-danger mt-3">SUBMETER EMERGÊNCIA</button>
    </form>
</div>

<div class="modal fade" id="mapModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0"><div id="map"></div><div class="p-3"><button class="btn-u" onclick="confirmLocation()">Confirmar Local</button></div></div></div></div>

<div class="u-nav" id="mainNav">
    <button class="nav-item active" onclick="switchView('home-view')"><i class="fa-solid fa-house"></i>Início</button>
    <button class="nav-item" onclick="switchView('form-view')"><i class="fa-solid fa-car-side"></i>Viagem</button>
    <button class="nav-item" onclick="switchView('history-view'); loadRecentHistory();"><i class="fa-solid fa-chart-pie"></i>Status</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const IMGBB_KEY = '752f66aaa3afa895ee81d09b023b226a';
    const motoristas = ["Agostinho Mujanda", "Alberto Barros", "Arlindo Cossa", "Carlos Mirassy", "Carlos Saboia"];
    const frota = { "Sofala": ["AEA-596-MP", "AGD-259-MC", "AGG-921-MC"], "Niassa": ["ABY-323-MP", "AGD-264-MC"], "Tete": ["AGG-919-MC", "AGG-924-MC"], "Manica": ["AGQ-261-MC", "AJV-250-MC"], "Maputo": ["AFX-797-MP"] };

    // --- SISTEMA SPA E LOGIN ---
    function switchView(id) {
        document.getElementById('mainNav').style.display = (id === 'login-view') ? 'none' : 'flex';
        document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const mList = motoristas.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('driver').innerHTML = '<option value="">Motorista...</option>' + mList;
        document.getElementById('incDriver').innerHTML = '<option value="">Motorista Envolvido...</option>' + mList;
        
        const allV = Object.values(frota).flat().map(v => `<option value="${v}">${v}</option>`).join('');
        document.getElementById('maintVehicle').innerHTML = '<option value="">Viatura...</option>' + allV;

        const email = localStorage.getItem('echo_user_email');
        if (email) {
            document.getElementById('uAvatar').innerText = email.charAt(0).toUpperCase();
            switchView('home-view');
        } else { switchView('login-view'); }
    });

    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        localStorage.setItem('echo_user_email', document.getElementById('loginEmail').value);
        location.reload();
    };

    // --- UTILITÁRIOS ---
    function navTo(s) { 
        document.getElementById('stepTitle').innerText = `Passo ${s}`;
        document.querySelectorAll('.step-group').forEach(g => g.style.display = 'none');
        document.getElementById(`step-${s}`).style.display = 'block';
    }

    function atualizarFrota(pId, vId) {
        const p = document.getElementById(pId).value;
        const s = document.getElementById(vId);
        s.innerHTML = '<option value="">Viatura...</option>';
        if (p && frota[p]) { s.disabled = false; frota[p].forEach(v => s.add(new Option(v,v))); } else { s.disabled = true; }
    }

    function calcDist() {
        const i = parseFloat(document.getElementById('kmI').value) || 0;
        const f = parseFloat(document.getElementById('kmF').value) || 0;
        document.getElementById('dispKm').innerText = (f-i > 0 ? f-i : 0) + " KM";
    }

    function addFuel() {
        const div = document.createElement('div');
        div.className = 'bg-light p-3 rounded-3 mb-2 fuel-row';
        div.innerHTML = `<input type="number" step="0.01" class="u-field f-l" placeholder="Litros"><input type="number" step="0.01" class="u-field f-p" value="90.50">`;
        document.getElementById('fuelList').appendChild(div);
    }

    // --- MAPS ---
    let map, marker, geocoder, activeInput;
    function initMap() { 
        geocoder = new google.maps.Geocoder();
        map = new google.maps.Map(document.getElementById('map'), { center:{lat:-25.9, lng:32.5}, zoom:15, disableDefaultUI:true });
        marker = new google.maps.Marker({ map:map, draggable:true });
    }
    function openMapModal(id) {
        activeInput = id;
        new bootstrap.Modal(document.getElementById('mapModal')).show();
        if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p => {
            const pos = {lat:p.coords.latitude, lng:p.coords.longitude};
            map.setCenter(pos); marker.setPosition(pos);
        });
    }
    function confirmLocation() {
        const pos = marker.getPosition();
        geocoder.geocode({location:pos}, (res) => {
            if(res[0]) document.getElementById(activeInput).value = res[0].formatted_address;
            bootstrap.Modal.getInstance(document.getElementById('mapModal')).hide();
        });
    }

    // --- GRAVAÇÃO (MOTOR PRINCIPAL) ---
    async function sendToCloud(payload) {
        document.getElementById('loader').style.display = 'flex';
        try {
            const response = await fetch('/api/save-entry', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if(response.ok) { 
                alert('✅ Gravado com sucesso na base de dados!'); 
                location.reload(); 
            } else { 
                alert('❌ Erro no servidor: ' + (result.message || 'Desconhecido')); 
            }
        } catch(e) { 
            alert('❌ Erro de conexão. Verifique a internet.'); 
        }
        document.getElementById('loader').style.display = 'none';
    }

    // SUBMETER LOGBOOK
    document.getElementById('logForm').onsubmit = (e) => {
        e.preventDefault();
        let fuel = [];
        document.querySelectorAll('.fuel-row').forEach(r => {
            const l = parseFloat(r.querySelector('.f-l').value) || 0;
            const p = parseFloat(r.querySelector('.f-p').value) || 0;
            if(l>0) fuel.push({ litros:l, precoPorLitro:p, custoTotal:(l*p) });
        });
        sendToCloud({
            action: 'logbook',
            submetidoPor: localStorage.getItem('echo_user_email'),
            motorista: document.getElementById('driver').value,
            viatura: document.getElementById('vehicle').value,
            provincia: document.getElementById('province').value,
            kmInicial: document.getElementById('kmI').value,
            kmFinal: document.getElementById('kmF').value,
            passageiro: document.getElementById('passenger').value,
            origem: document.getElementById('ori').value,
            destino: document.getElementById('des').value,
            abastecimentos: fuel
        });
    };

    // SUBMETER MANUTENÇÃO
    document.getElementById('maintForm').onsubmit = (e) => {
        e.preventDefault();
        sendToCloud({
            action: 'maintenance',
            submetidoPor: localStorage.getItem('echo_user_email'),
            viatura: document.getElementById('maintVehicle').value,
            tipo: document.getElementById('maintType').value,
            km: document.getElementById('maintKm').value,
            custo: document.getElementById('maintCost').value,
            proxima: document.getElementById('maintNext').value
        });
    };

    // SUBMETER INCIDENTE (COM UPLOAD IMGBB)
    document.getElementById('incidentForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader').style.display = 'flex';
        let url = "Sem Foto";
        const file = document.getElementById('incPhoto').files[0];
        
        if(file) {
            try {
                const fd = new FormData();
                fd.append('image', file);
                const resI = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                const jsonI = await resI.json();
                if(jsonI.success) url = jsonI.data.url;
            } catch(err) { console.error("Erro upload foto"); }
        }

        sendToCloud({
            action: 'incident',
            submetidoPor: localStorage.getItem('echo_user_email'),
            motorista: document.getElementById('incDriver').value,
            viatura: document.getElementById('incVehicle').value,
            provincia: document.getElementById('incProvince').value,
            tipo: document.getElementById('incType').value,
            gravidade: document.getElementById('incUrgency').value,
            localizacao: document.getElementById('incLoc').value,
            descricao: document.getElementById('incDesc').value,
            foto: url
        });
    };
</script>
</body>
</html>
