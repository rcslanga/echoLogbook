<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logbook App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBIJPWtg4ruD7z9f1OGltvFFVPQBqa8eGQ&libraries=places&callback=initMap" async defer></script>

    <style>
        :root { 
            --uber-black: #000000;
            --uber-white: #FFFFFF;
            --uber-gray-light: #F6F6F6;
            --uber-gray-border: #EEEEEE;
            --uber-text-gray: #545454;
            --uber-blue: #276EF1;
            --uber-red: #E11900;
        }
        
        body { 
            background-color: var(--uber-white); 
            color: var(--uber-black); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding-bottom: 90px;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Estilo Uber: SPA Vistas --- */
        .app-view { display: none; }
        .app-view.active { display: block; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Login Minimalista --- */
        #login-view { background: var(--uber-black); min-height: 100vh; padding: 40px 25px; color: white; display: flex; flex-direction: column; justify-content: center; }
        .login-brand { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 40px; }
        .uber-input { background: #222; border: 1px solid #333; color: white; padding: 18px; border-radius: 8px; margin-bottom: 15px; width: 100%; }

        /* --- Header --- */
        .header-main { padding: 40px 20px 20px; background: white; border-bottom: 1px solid var(--uber-gray-border); }
        .header-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }

        /* --- Grid de Ações (Estilo Uber Tiles) --- */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .uber-tile { 
            background: var(--uber-gray-light); 
            border-radius: 12px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            justify-content: space-between;
            height: 140px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .uber-tile:active { transform: scale(0.96); background: #EAEAEA; }
        .uber-tile i { font-size: 1.5rem; color: var(--uber-black); }
        .uber-tile span { font-weight: 600; font-size: 1rem; }

        /* --- Formulários Clean --- */
        .section-label { font-size: 1.1rem; font-weight: 700; margin: 25px 20px 15px; }
        .form-group-uber { padding: 0 20px; margin-bottom: 20px; }
        .uber-field-label { font-size: 0.75rem; font-weight: 600; color: var(--uber-text-gray); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .uber-select, .uber-input-field { 
            width: 100%; border: none; background: var(--uber-gray-light); padding: 15px; border-radius: 8px; font-weight: 500; font-size: 1rem; appearance: none;
        }
        .uber-select:focus, .uber-input-field:focus { outline: 2px solid var(--uber-black); }

        /* --- Botão Principal --- */
        .btn-uber { 
            background: var(--uber-black); color: white; border: none; width: 100%; padding: 18px; font-weight: 600; font-size: 1.1rem; border-radius: 8px; transition: 0.2s;
        }
        .btn-uber:active { opacity: 0.8; }
        .btn-fixed { position: fixed; bottom: 100px; left: 20px; right: 20px; z-index: 100; }

        /* --- Bottom Navigation --- */
        .uber-nav { 
            position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid var(--uber-gray-border); 
            display: flex; justify-content: space-around; padding: 10px 0 25px; z-index: 1000;
        }
        .nav-link { color: #AFAFAF; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 500; }
        .nav-link.active { color: var(--uber-black); }
        .nav-link i { font-size: 1.3rem; }

        /* --- Cards de Histórico --- */
        .history-card { border-bottom: 1px solid var(--uber-gray-border); padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .history-info h4 { font-size: 1rem; font-weight: 600; margin: 0; }
        .history-info p { font-size: 0.85rem; color: var(--uber-text-gray); margin: 0; }
        .history-km { font-weight: 700; font-size: 1rem; }

        /* --- Loading Uber Style --- */
        #loader { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; 
            flex-direction: column; justify-content: center; align-items: center; 
        }
        .spinner-uber { width: 40px; height: 40px; border: 4px solid var(--uber-gray-light); border-top: 4px solid var(--uber-black); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner-uber"></div>
    <span class="mt-3 fw-bold small text-uppercase">Logbook App</span>
</div>

<div id="login-view" class="app-view active">
    <div class="login-brand">Logbook<br>App.</div>
    <form id="loginForm">
        <input type="email" id="loginEmail" class="uber-input" placeholder="Endereço de e-mail" required>
        <button type="submit" class="btn-uber mt-3">Seguinte <i class="fa-solid fa-arrow-right ms-2"></i></button>
    </form>
    <div id="loginError" class="text-danger small mt-3" style="display: none;"></div>
</div>

<div id="home-view" class="app-view">
    <div class="header-main d-flex justify-content-between align-items-end">
        <div>
            <div class="text-uppercase small fw-bold text-secondary mb-1">Operações Frota</div>
            <div class="header-title">Logbook App</div>
        </div>
        <div id="userAvatar" style="width: 45px; height: 45px; border-radius: 50%; background: #000; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800;">U</div>
    </div>

    <div class="action-grid">
        <div class="uber-tile" onclick="switchView('form-view')">
            <i class="fa-solid fa-car"></i>
            <span>Nova Viagem</span>
        </div>
        <div class="uber-tile" onclick="switchView('maintenance-view')">
            <i class="fa-solid fa-wrench"></i>
            <span>Manutenção</span>
        </div>
        <div class="uber-tile" onclick="switchView('incidents-view'); autoFillIncidentOrigin();" style="background: #FFF0F0; border-color: #FFDADA;">
            <i class="fa-solid fa-triangle-exclamation" style="color: var(--uber-red);"></i>
            <span style="color: var(--uber-red);">Ocorrência</span>
        </div>
        <div class="uber-tile" onclick="switchView('history-view'); loadRecentHistory();">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Histórico</span>
        </div>
    </div>
</div>

<div id="form-view" class="app-view">
    <div class="header-main">
        <button class="border-0 bg-transparent p-0 mb-3" onclick="switchView('home-view')"><i class="fa-solid fa-arrow-left fs-4"></i></button>
        <div class="header-title">Detalhes da Viagem</div>
    </div>

    <form id="logForm">
        <div class="section-label">Viatura</div>
        <div class="form-group-uber">
            <label class="uber-field-label">Província</label>
            <select id="province" class="uber-select" onchange="atualizarFrota('province', 'vehicle')" required>
                <option value="">Selecione...</option>
                <option value="Maputo">Maputo</option><option value="Sofala">Sofala</option><option value="Manica">Manica</option>
                <option value="Tete">Tete</option><option value="Niassa">Niassa</option>
            </select>
        </div>
        <div class="form-group-uber">
            <label class="uber-field-label">Carro / Matrícula</label>
            <select id="vehicle" class="uber-select" disabled required></select>
        </div>

        <div class="section-label">Odómetro</div>
        <div class="row px-3">
            <div class="col-6 mb-3">
                <label class="uber-field-label">Início</label>
                <input type="number" id="kmI" class="uber-input-field" placeholder="0" oninput="calcViagem()" required>
            </div>
            <div class="col-6 mb-3">
                <label class="uber-field-label">Fim</label>
                <input type="number" id="kmF" class="uber-input-field" placeholder="0" oninput="calcViagem()" required>
            </div>
        </div>

        <div class="form-group-uber">
            <div class="p-3 bg-light rounded-3 d-flex justify-content-between align-items-center">
                <span class="small fw-bold text-uppercase">Distância</span>
                <span id="dispKm" class="fs-4 fw-800">0 KM</span>
            </div>
        </div>

        <div class="section-label">Informação Adicional</div>
        <div class="form-group-uber">
            <label class="uber-field-label">Motorista</label>
            <select id="driver" class="uber-select" required></select>
        </div>
        <div class="form-group-uber">
            <label class="uber-field-label">Destino / Missão</label>
            <input type="text" id="des" class="uber-input-field" placeholder="Ex: Chimoio, Sede...">
        </div>

        <div class="p-4">
            <button type="submit" class="btn-uber">Finalizar Registo</button>
        </div>
    </form>
</div>

<div id="incidents-view" class="app-view">
    <div class="header-main">
        <button class="border-0 bg-transparent p-0 mb-3" onclick="switchView('home-view')"><i class="fa-solid fa-arrow-left fs-4"></i></button>
        <div class="header-title">Reportar Incidente</div>
    </div>

    <form id="incidentForm">
        <div class="section-label">Dados Críticos</div>
        <div class="form-group-uber">
            <label class="uber-field-label">Província</label>
            <select id="incProvince" class="uber-select" onchange="atualizarFrota('incProvince', 'incVehicle')" required>
                <option value="">Selecione...</option>
                <option value="Maputo">Maputo</option><option value="Sofala">Sofala</option><option value="Manica">Manica</option>
                <option value="Tete">Tete</option><option value="Niassa">Niassa</option>
            </select>
        </div>
        <div class="form-group-uber">
            <label class="uber-field-label">Viatura</label>
            <select id="incVehicle" class="uber-select" disabled required></select>
        </div>

        <div class="form-group-uber">
            <label class="uber-field-label">Tipo de Ocorrência</label>
            <select id="incType" class="uber-select" required>
                <option value="">Selecione...</option>
                <option value="Acidente">Acidente de Viação</option>
                <option value="Avaria">Avaria Mecânica</option>
                <option value="Furo">Furo de Pneu</option>
            </select>
        </div>

        <div class="form-group-uber">
            <label class="uber-field-label">Descrição dos factos</label>
            <textarea id="incDesc" class="uber-input-field" rows="3" placeholder="O que aconteceu?"></textarea>
        </div>

        <div class="form-group-uber">
            <label class="uber-field-label">Foto da Evidência</label>
            <input type="file" id="incPhoto" class="uber-input-field" accept="image/*" capture="environment">
        </div>

        <div class="p-4">
            <button type="submit" class="btn-uber" style="background: var(--uber-red);">Submeter Emergência</button>
        </div>
    </form>
</div>

<div id="history-view" class="app-view">
    <div class="header-main">
        <button class="border-0 bg-transparent p-0 mb-3" onclick="switchView('home-view')"><i class="fa-solid fa-arrow-left fs-4"></i></button>
        <div class="header-title">Actividade Recente</div>
    </div>
    <div id="historicoContainer" class="mt-2">
        </div>
</div>

<div class="uber-nav">
    <a href="#" class="nav-link active" onclick="switchView('home-view')"><i class="fa-solid fa-house"></i>Início</a>
    <a href="#" class="nav-link" onclick="switchView('form-view')"><i class="fa-solid fa-car"></i>Viagens</a>
    <a href="#" class="nav-link" onclick="switchView('history-view'); loadRecentHistory();"><i class="fa-solid fa-receipt"></i>Atividade</a>
</div>

<script>
    // --- CONFIGURAÇÃO ---
    const VERCEL_BASE_URL = ''; // Cole o seu URL do Vercel aqui
    const IMGBB_API_KEY = '752f66aaa3afa895ee81d09b023b226a';

    const motoristasFallback = ["Agostinho Mujanda", "Alberto Barros", "Arlindo Cossa", "Carlos Mirassy", "Carlos Saboia"];
    const frota = { 
        "Sofala": ["AEA-596-MP (Ford)", "AGD-259-MC (Hilux)", "AGG-921-MC (Hilux)", "AGQ-300-MC (Hilux)", "ABA-169-SF (Hilux)"],
        "Niassa": ["ABY-323-MP (Cruiser)", "AGD-264-MC (Hilux)", "AGD-262-MC (Hilux)"],
        "Tete": ["AGG-919-MC (Hilux)", "AGG-924-MC (Hilux)", "ANN-412-MC (Mazda)"],
        "Manica": ["AGQ-261-MC (Hilux)", "AIT-430-MC (Nissan)", "AIB-879-MP (Hilux)"],
        "Maputo": ["AFX-797-MP (Fortuner)"]
    };

    // --- LÓGICA CORE ---
    document.addEventListener('DOMContentLoaded', () => {
        // Popula Motoristas
        document.getElementById('driver').innerHTML = '<option value="">Motorista...</option>' + motoristasFallback.map(m => `<option value="${m}">${m}</option>`).join('');

        const savedEmail = localStorage.getItem('echo_user_email');
        if (savedEmail) {
            document.getElementById('userAvatar').innerText = savedEmail.substring(0,1).toUpperCase();
            switchView('home-view');
        } else {
            switchView('login-view');
        }
    });

    function switchView(viewId) {
        document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        window.scrollTo(0,0);
    }

    function atualizarFrota(idProv, idVeh) {
        const prov = document.getElementById(idProv).value;
        const sel = document.getElementById(idVeh);
        sel.innerHTML = '<option value="">Viatura...</option>';
        if (prov && frota[prov]) {
            sel.disabled = false;
            frota[prov].forEach(v => sel.add(new Option(v, v)));
        } else { sel.disabled = true; }
    }

    function calcViagem() {
        const i = parseFloat(document.getElementById('kmI').value) || 0;
        const f = parseFloat(document.getElementById('kmF').value) || 0;
        document.getElementById('dispKm').innerText = (f - i > 0 ? f - i : 0) + " KM";
    }

    // --- SUBMISSÃO OCORRÊNCIA (CONVERTENDO FOTO) ---
    document.getElementById('incidentForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader').style.display = 'flex';
        
        let photoUrl = "Sem Foto";
        const file = document.getElementById('incPhoto').files[0];

        if (file) {
            const body = new FormData();
            body.append('image', file);
            try {
                const resImg = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: body });
                const jsonImg = await resImg.json();
                if(jsonImg.success) photoUrl = jsonImg.data.url;
            } catch (err) { console.error("Erro ImgBB"); }
        }

        const data = {
            action: 'incident',
            submetidoPor: localStorage.getItem('echo_user_email'),
            provincia: document.getElementById('incProvince').value,
            viatura: document.getElementById('incVehicle').value,
            tipoOcorrencia: document.getElementById('incType').value,
            descricao: document.getElementById('incDesc').value,
            foto: photoUrl
        };

        try {
            const res = await fetch(VERCEL_BASE_URL + '/api/save-entry', { 
                method: "POST", headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) 
            });
            if(res.ok) { alert('Reportado!'); location.reload(); }
        } catch(e) { alert('Erro na rede'); }
        document.getElementById('loader').style.display = 'none';
    };

    // --- LOGIN ---
    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        if(email.includes('@')) {
            localStorage.setItem('echo_user_email', email);
            location.reload();
        }
    };
</script>

</body>
</html>
