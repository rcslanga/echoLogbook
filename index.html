<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO Drive Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --uber-black: #050505; --uber-blue: #276ef1; --card-bg: #121212; --input-bg: #1f1f1f; --text-gray: #a6a6a6; }
        body { background-color: var(--uber-black); color: white; font-family: 'Inter', sans-serif; padding-bottom: 110px; }
        .app-header { padding: 30px 20px 10px; background: var(--uber-black); }
        .nav-pills { background: #1a1a1a; margin: 0 20px 20px; border-radius: 50px; padding: 5px; border: 1px solid #333; }
        .nav-pills .nav-link { color: var(--text-gray); border-radius: 50px; font-weight: 600; font-size: 0.75rem; border: none; }
        .nav-pills .nav-link.active { background-color: white; color: black; }
        
        .form-card { background: var(--card-bg); border-radius: 28px; padding: 25px; margin: 0 20px 20px; border: 1px solid #222; position: relative; }
        .form-label { color: var(--text-gray); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .form-control, .form-select { background-color: var(--input-bg); border: 1px solid #333; color: white; border-radius: 14px; padding: 12px; margin-bottom: 15px; font-size: 0.95rem; }
        
        /* Thumbnail Style */
        .vehicle-thumb-container {
            position: absolute; top: 20px; right: 20px; width: 70px; height: 45px;
            background: #1a1a1a; border-radius: 10px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #vehicleThumb { max-width: 85%; max-height: 85%; opacity: 0; transition: opacity 0.4s; }

        .km-display { text-align: center; padding: 20px; background: linear-gradient(135deg, #276ef1, #0645ad); border-radius: 22px; margin-bottom: 20px; }
        .km-display h2 { font-size: 2.2rem; font-weight: 800; margin: 0; }
        
        .fixed-bottom-btn { position: fixed; bottom: 25px; left: 20px; right: 20px; z-index: 1000; }
        .btn-uber { background-color: var(--uber-blue); color: white; border: none; border-radius: 18px; padding: 18px; width: 100%; font-weight: 700; font-size: 1rem; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
    <span class="mt-3 fw-bold small">SINCRONIZANDO COM SERVIDOR...</span>
</div>

<div class="app-header">
    <h1 class="fw-bold h4 mb-0">ECHO <span style="color: var(--uber-blue);">Drive</span></h1>
    <p class="text-secondary small" style="font-size: 0.7rem;">LOGBOOK DIGITAL MOÇAMBIQUE</p>
</div>

<ul class="nav nav-pills nav-justified" id="pills-tab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-1">VIATURA</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-2">CUSTOS</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-3">MISSÃO</button></li>
</ul>

<form id="logForm">
    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-1">
            <div class="form-card">
                <div class="vehicle-thumb-container"><img id="vehicleThumb" src="" alt="Viatura"></div>
                
                <label class="form-label">Motorista</label>
                <select id="driver" class="form-select" required>
                    <option value="">Seleccione o motorista...</option>
                    <option>Agostinho Mujanda</option><option>Alberto Barros</option><option>Arlindo Cossa</option>
                    <option>Bernardo Nsicuzinaimue</option><option>Carlos Mirassy</option><option>Carlos Saboia</option>
                    <option>Edson de Sousa</option><option>Faizal Matuare Alide</option><option>Fernando Muianga</option>
                    <option>Fungai Ulhanane</option><option>Herminio Muchave</option><option>Inacio Paulo Augusto Junior</option>
                    <option>Joao Aide</option><option>Joao Bonda</option><option>Joao Massocha</option><option>Joao Paulo Ganje</option>
                    <option>Jone Juze Aleixo</option><option>Manuel Jose</option><option>Manuel Xavier</option>
                    <option>Marcos Campaunda</option><option>Moises Ndoa</option><option>Rajhi Mussa</option>
                    <option>Raul Baptista</option><option>Silvestre Angelica</option>
                </select>

                <label class="form-label">Província</label>
                <select id="province" class="form-select" onchange="atualizarFrota()" required>
                    <option value="">Seleccione a região...</option>
                    <option>Sofala</option><option>Manica</option><option>Tete</option><option>Niassa</option><option>Maputo</option>
                </select>

                <label class="form-label">Viatura Associada</label>
                <select id="vehicle" class="form-select" disabled required onchange="updateThumb()">
                    <option value="">Aguardando província...</option>
                </select>

                <div class="km-display"><small class="opacity-75">DISTÂNCIA</small><h2 id="totalKm">0 KM</h2></div>
                <div class="row">
                    <div class="col-6"><label class="form-label">KM Inicial</label><input type="number" id="kmI" class="form-control" placeholder="0" oninput="calc()"></div>
                    <div class="col-6"><label class="form-label">KM Final</label><input type="number" id="kmF" class="form-control" placeholder="0" oninput="calc()"></div>
                </div>
            </div>
            <div class="fixed-bottom-btn"><button type="button" class="btn-uber" onclick="showTab('tab-2')">PRÓXIMO</button></div>
        </div>

        <div class="tab-pane fade" id="tab-2">
            <div class="form-card">
                <label class="form-label">Abastecimento (Litros)</label>
                <input type="number" step="0.01" class="form-control" id="litros" placeholder="0.00">
                <label class="form-label">Custo Combustível (MZN)</label>
                <input type="number" class="form-control" id="valorFuel" placeholder="0.00">
                <label class="form-label">Portagens / Tolls (MZN)</label>
                <input type="number" class="form-control" id="portagens" placeholder="0">
            </div>
            <div class="fixed-bottom-btn"><button type="button" class="btn-uber" onclick="showTab('tab-3')">DADOS DA EQUIPA</button></div>
        </div>

        <div class="tab-pane fade" id="tab-3">
            <div class="form-card">
                <label class="form-label">Passageiro (Nome | Email)</label>
                <input class="form-control" list="staffList" id="passenger" placeholder="Pesquisar utilizador...">
                <datalist id="staffList">
                    <option value="Abdul Fahamo | Abdul_Fahamo@echomoz.org">
                    <option value="Agostinho Mujanda | Agostinho_Mujanda@echomoz.org">
                    <option value="Alberto Barros | Alberto_Barros@echomoz.org">
                    <option value="Carlos Mirassy | Carlos_Mirassy@echomoz.org">
                    <option value="Julio Pacca | Julio.Pacca@abtglobal.com">
                    <option value="Vânia Macome | Vania_Macome@echomoz.org">
                    </datalist>

                <label class="form-label">Task Code</label>
                <select id="task" class="form-select" required>
                    <script>
                        [2010,2020,2030,2040,2050,2060,2070,2110,2120,2130,2140,2150,2160,2170,2210,2220,2230,2240,2250,2260,2270,2310,2320,2330,2340,2350,2360,2370,2410,2420,2430,2440,2450,2460,2470,2510,2520,2530,2540,2550,2560,2570,3020,3030,3040,3050,3060,3070,4010,4020].forEach(c => document.write(`<option>${c}</option>`));
                    </script>
                </select>

                <div class="row">
                    <div class="col-6"><label class="form-label">Origem</label><input type="text" class="form-control" id="ori" placeholder="Ponto de Partida"></div>
                    <div class="col-6"><label class="form-label">Destino</label><input type="text" class="form-control" id="des" placeholder="Ponto de Chegada"></div>
                </div>

                <label class="form-label">Propósito / Observações</label>
                <textarea id="obs" class="form-control" rows="2" placeholder="Descreva a missão..."></textarea>
                
                <label class="form-label">Foto Comprovativa</label>
                <input type="file" class="form-control" accept="image/*" capture="camera">
            </div>
            <div class="fixed-bottom-btn"><button type="submit" class="btn-uber" style="background: white; color: black;">FINALIZAR LOGBOOK</button></div>
        </div>
    </div>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const frota = {
        "Sofala": ["AEA-596-MP (Ford)", "AGG-921-MC (Hilux)", "AIU-716-MC (Nissan)", "AJV-251-MC (LC)"],
        "Niassa": ["ABY-323-MP (LC)", "AGD-264-MC (Hilux)", "AGG-929-MC (Hilux)"],
        "Manica": ["AGQ-261-MC (Hilux)", "AIT-430-MC (Nissan)", "AJV-250-MC (LC)"],
        "Tete": ["AGG-919-MC (Hilux)", "AIT-437-MC (Nissan)", "ANN-412-MC (Mazda)"],
        "Maputo": ["AFX-797-MP (Fortuner)"]
    };

    const icons = {
        "Hilux": "https://prowars.info/wp-content/uploads/2020/09/hilux-icon.png",
        "Ford": "https://www.pngall.com/wp-content/uploads/2/Ford-Ranger-PNG-Clipart.png",
        "LC": "https://www.pngall.com/wp-content/uploads/2/Toyota-Land-Cruiser-PNG-HD.png",
        "Nissan": "https://www.pngall.com/wp-content/uploads/12/Nissan-Frontier-PNG-Image.png",
        "Mazda": "https://www.pngall.com/wp-content/uploads/2/Mazda-PNG-Pic.png",
        "Fortuner": "https://www.pngall.com/wp-content/uploads/2/Toyota-Fortuner-PNG-Free-Download.png",
        "default": "https://cdn-icons-png.flaticon.com/512/744/744465.png"
    };

    function atualizarFrota() {
        const p = document.getElementById("province").value;
        const s = document.getElementById("vehicle");
        s.innerHTML = '<option value="">Seleccione o veículo...</option>';
        if(p && frota[p]) {
            s.disabled = false;
            frota[p].forEach(v => s.add(new Option(v, v)));
        } else { s.disabled = true; }
        document.getElementById("vehicleThumb").style.opacity = "0";
    }

    function updateThumb() {
        const val = document.getElementById("vehicle").value;
        const img = document.getElementById("vehicleThumb");
        let model = "default";
        if (val.includes("Hilux")) model = "Hilux";
        else if (val.includes("Ford")) model = "Ford";
        else if (val.includes("LC")) model = "LC";
        else if (val.includes("Nissan")) model = "Nissan";
        else if (val.includes("Mazda")) model = "Mazda";
        else if (val.includes("Fortuner")) model = "Fortuner";
        
        img.src = icons[model];
        img.style.opacity = "1";
    }

    function calc() {
        const i = parseFloat(document.getElementById("kmI").value) || 0;
        const f = parseFloat(document.getElementById("kmF").value) || 0;
        document.getElementById("totalKm").innerText = (f - i > 0 ? f - i : 0) + " KM";
    }

    function showTab(id) { new bootstrap.Tab(document.querySelector(`button[data-bs-target="#${id}"]`)).show(); window.scrollTo(0,0); }

    document.getElementById('logForm').onsubmit = (e) => {
        e.preventDefault();
        document.getElementById('loader').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            alert('VIAGEM SUBMETIDA COM SUCESSO!');
        }, 2000);
    };
</script>
</body>
</html>
